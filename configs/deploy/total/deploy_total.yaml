env:  # 推理环境设置。
  inference_env: real  # 选仿真还是真机。
  only_arm: true  # 是否只控机械臂。
  eef_type: leju_claw  # 夹爪或手型类型。
  platform_type: "4pro"  # 机器人型号。
  control_mode: joint  # 控制方式。
  which_arm: both  # 控制左手、右手还是双手。
  head_init: [0, 12]  # 仿真中使用的头部初始角度 [yaw, pitch]。真机不会使用此角度。

  ros_rate: 10  # ROS 运行频率。
  direct_to_wbc: false  # 是否直接发给 WBC。
  enable_action_interpolation: true
  control_rate: 100  # WBC/插值后的实际控制指令频率
  image_size: [848, 480]  # 相机缩放尺寸。
  depth_range: [0, 1500]  # 深度裁剪范围。
  obs_key_map:  # 与 KuavoBrain v3 生产数采一致：H.265 主码流（非 JPEG compressed）。
    head_cam_h: ["/cam_h/color/h265_stream", "CompressedImage", 30, "${env.image_size}"]
    wrist_cam_l: ["/cam_l/color/h265_stream", "CompressedImage", 30, "${env.image_size}"]
    wrist_cam_r: ["/cam_r/color/h265_stream", "CompressedImage", 30, "${env.image_size}"]
    joint_q: ["/sensors_data_raw", "sensorsData", 500]  # 关节状态 topic。
    rq2f85: ["/gripper/state", "JointState", 500]  # RQ2F85 topic。选这个夹爪时自动生效。
    leju_claw: ["/leju_claw_state", "lejuClawState", 500]  # Leju claw topic。选这个夹爪时自动生效。
    qiangnao: ["/dexhand/state", "JointState", 500]  # Qiangnao topic。选这个手型时自动生效。
  arm_state_keys: ["joint_q", "gripper"]  # 哪些状态会拼成 observation.state。
  ratio: 1.0  # 动作缩放比例。
  frame_alignment: false  # 是否做时间对齐。
  qiangnao_dof_needed: 1  # Qiangnao 暴露多少个自由度。

  limits:  # 动作和状态的上下限。
    joint_q:  # 关节上下限。
      min: [-3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14]  # 关节最小值。
      max: [3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14]  # 关节最大值。
    gripper:  # 夹爪上下限。
      min: [0, 0]  # 夹爪最小值。
      max: [1, 1]  # 夹爪最大值。
    eef:  # 末端绝对位姿上下限。
      min: [-1, -1, -1, -3.14, -3.14, -3.14, -1, -1, -1, -3.14, -3.14, -3.14]  # 末端绝对最小值。
      max: [1, 1, 1, 3.14, 3.14, 3.14, 1, 1, 1, 3.14, 3.14, 3.14]  # 末端绝对最大值。
    base:  # 底盘控制上下限。
      min: [-2.0, -2.0, -3.14, 0]  # 底盘最小值。
      max: [2.0, 2.0, 3.14, 1]  # 底盘最大值。
  is_binary: false  # 夹爪是否按开/关处理。

inference:  # 推理和评测设置。
  go_bag_path: ""  # bag 回放路径。现在一般不用。
  policy_type: act  # 要加载的模型类型。
  pretrained_path: outputs/train/act_your_dataset  # 要加载的权重路径。
  eval_episodes: 1  # 评测跑多少条。
  seed: 42  # 随机种子。
  start_seed: 42  # 多条评测时的起始种子。
  device: cuda  # 推理设备。

  max_episode_steps: 200  # 每条最多跑多少步。
  task_prompt: "robot manipulation"  # 任务提示语。

  async_inference: false  # 是否使用 chunk 异步推理。
  async_control_hz: 0.0  # 异步控制频率，0 表示使用 env.ros_rate。
  async_buffer_size: 50  # action 队列最大长度。
  async_low_watermark: 5  # 队列剩余动作数小于等于该值时触发下一次 chunk 推理。
  async_warmup_actions: 1  # 启动控制线程前至少等待的动作数量。
  async_action_timeout: 1.0  # 控制线程等待新动作的最长时间，超时后停止。

  # RTC-Lite（部署侧 chunk 合并）。仅在 async_inference 且 rtc_lite_enabled 同时为 true 时生效。
  rtc_lite_enabled: false  # 是否启用 RTC-Lite 队列合并。
  rtc_lite_overlap_steps: 5  # 新旧 chunk 在边界处线性/余弦混合的步数。
  rtc_lite_freeze_steps: 1  # 强制保留的旧动作前缀长度，避免下一步动作发生跳变。
  rtc_lite_ramp: cosine  # 混合权重曲线，可选 linear / cosine
  rtc_lite_max_delay_steps: 3  # 延迟补偿的上限步数。
  rtc_lite_keep_min_actions: 1  # 队列可用时至少保留的旧动作数量。

  # RTC Full（模型动作空间内连续性引导）。与 RTC-Lite 互斥，仅用于异步推理。
  rtc_full_enabled: false
  rtc_full_mode: vjp  # 可选 vjp / inpainting。
  rtc_full_overlap_steps: 5  # RTC 连续性目标长度；vjp 约束长度，inpainting 融合长度。
  rtc_full_max_delay_steps: 8
  rtc_full_debug: false

  # VJP ONLY
  rtc_full_prefix_attention_schedule: exp
  rtc_full_max_guidance_weight: 5.0
  # INPAINTING ONLY
  rtc_full_frozen_steps: 2
  rtc_full_ramp_rate: 5.0
